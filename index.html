        /* --- SPLASH SCREEN --- */
        .splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: radial-gradient(circle at center, #141419 0%, #08080a 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
        }
        .splash-screen.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .splash-subtitle { font-size: 1rem; letter-spacing: 6px; color: #8a8a93; margin-bottom: 8px; text-transform: uppercase; }
        .splash-title { font-size: 2.5rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 40px; text-align: center; background: linear-gradient(45deg, #ffffff, #a0a0aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .start-btn:hover { color: #08080a; background-color: #00f0ff; box-shadow: 0 0 30px rgba(0, 240, 255, 0.4); transform: scale(1.05); }

        /* --- MAIN CONTAINER --- */
        .container { 
            max-width: 480px; width: 100%; background: rgba(0, 0, 0, 0.3); border-radius: 24px; 
            overflow: hidden; padding-bottom: 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 40px 20px 20px 20px;
        }  
        .cover-photo { width: 100%; height: 160px; object-fit: cover; }
        .profile-section { text-align: center; margin-top: -75px; padding: 0 20px; margin-bottom: 25px; }  
        .avatar { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 5px solid rgba(0, 0, 0, 0.3); margin-bottom: 12px; background: #222; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); }  
        .profile-section h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .profile-section p { font-size: 0.95rem; opacity: 0.85; font-weight: 500; white-space: pre-line; }

        /* --- LINKS --- */
        .link-card { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); margin: 0 20px 12px 20px; border-radius: 14px; transition: all 0.25s ease-in-out; }  
        .link-card:hover { background: rgba(255, 255, 255, 0.18); transform: translateY(-2px); border-color: rgba(255, 255, 255, 0.3); }  
        .link-card a { text-decoration: none; color: #fff; padding: 14px 20px; display: flex; align-items: center; width: 100%; }  
        .link-icon { font-size: 1.4rem; width: 35px; text-align: left; opacity: 0.9; }
        .link-text { display: flex; flex-direction: column; justify-content: center; }
        .link-text span { font-weight: 600; font-size: 1rem; letter-spacing: 0.3px; }
        .link-text small { color: rgba(255, 255, 255, 0.65); font-size: 0.8rem; margin-top: 1px; }  

        /* --- MAIL ME BUTTON --- */
        .mail-btn-container { text-align: center; margin: 15px 0; }

            text-decoration: none; color: #fff; border: 1px solid rgba(255, 255, 255, 0.2);

        }
        .mail-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        .mail-btn i { margin-right: 8px; }

        /* --- FOOTER --- */

        .footer p { margin: 5px 0; }

        @media (max-width: 480px) {

            .start-btn { padding: 14px 32px; font-size: 1rem; }
        }
